ServerName localhost
DirectoryIndex index.php

<Directory "/var/www/html">
    Options -Indexes +FollowSymLinks
    AllowOverride None
    Require all granted
</Directory>

# Configuration, uploaded media, caches, and GEDCOM data are private.
<Directory "/var/www/html/webtrees/data">
    Require all denied
</Directory>

# Application internals do not need to be reachable over HTTP.
<LocationMatch "^/webtrees/(?:\.git|app|data|docker|modules|modules_v4|resources|tests|vendor)(?:/|$)">
    Require all denied
</LocationMatch>

<LocationMatch "^/webtrees/(?:\.dockerignore|Dockerfile|composer\.(?:json|lock)|package(?:-lock)?\.json|phpunit\.xml(?:\.dist)?|webpack\.config\.js)$">
    Require all denied
</LocationMatch>

<FilesMatch "^\.">
    Require all denied
</FilesMatch>
